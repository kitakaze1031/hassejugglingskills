<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ハッセ図エディタ（複数色・統合グラデーション版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            background-color: #f4f7f6;
            overflow: hidden;
        }

        #toolbar {
            background-color: #2c3e50;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 10;
            flex-shrink: 0;
            min-height: 40px;
            align-items: center;
        }

        #toolbar::-webkit-scrollbar { height: 4px; }
        #toolbar::-webkit-scrollbar-thumb { background: #7f8c8d; border-radius: 4px; }

        button, select {
            flex-shrink: 0;
            padding: 10px 14px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }

        button.active { background-color: #3498db; box-shadow: 0 0 8px #3498db; }
        button.active-delete { background-color: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        button.active-prereq { background-color: #e67e22; box-shadow: 0 0 8px #e67e22; }
        button.active-trans { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .btn-io { background-color: #8e44ad; }
        .btn-auth { background-color: #f39c12; color: white; }

        #user-info {
            color: white;
            font-size: 12px;
            display: none;
            margin-left: 8px;
        }

        .add-group {
            display: inline-flex;
            align-items: center;
            background-color: #34495e;
            border-radius: 8px;
            padding: 6px 8px;
            flex-shrink: 0;
            gap: 12px;
        }

        .color-palette-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(10, 22px);
            gap: 4px;
        }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        .color-swatch:active { transform: scale(0.85); }
        .color-swatch.selected { border: 2px solid #fff; box-shadow: 0 0 0 2px #3498db; }

        input[type="color"] {
            width: 32px;
            height: 32px;
            padding: 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            flex-shrink: 0;
        }

        input[type="text"], input[type="url"], textarea, select {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cfd8dc;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        textarea { min-height: 90px; resize: vertical; }

        #group-name-input {
            width: 150px;
            min-width: 150px;
            background: #ffffff;
            color: #2c3e50;
        }

        #cy-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
        }

        #cy { width: 100%; height: 100%; }

        #group-legend {
            position: absolute;
            right: 12px;
            bottom: 12px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 10px 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            min-width: 170px;
            max-width: min(70vw, 260px);
            font-size: 13px;
            color: #2c3e50;
        }

        #group-legend h4 { margin: 0 0 8px 0; font-size: 13px; }
        #group-legend-list { display: flex; flex-direction: column; gap: 2px; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.3;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .legend-item:hover { background-color: rgba(0, 0, 0, 0.08); }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }
        .legend-empty { color: #7f8c8d; padding: 4px; }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
        }

        .floating-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 14px;
            width: 88%;
            max-width: 380px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .floating-modal h3 { margin: 0 0 15px 0; font-size: 16px; color: #333; text-align: center; }
        .modal-field { margin-bottom: 12px; }
        .modal-field label { display: block; font-size: 12px; color: #555; margin-bottom: 6px; font-weight: bold; }
        
        .modal-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 10px;
            background-color: #3498db; color: white; border: none; border-radius: 8px;
            font-size: 14px; text-decoration: none; text-align: center; box-sizing: border-box; cursor: pointer;
        }

        .modal-btn.disabled { background-color: #bdc3c7; pointer-events: none; }
        .modal-btn.secondary { background-color: #16a085; }
        .close-btn { background-color: #e74c3c; margin-top: 15px; margin-bottom: 0; }
        .hint-text { margin: 4px 0 0 0; font-size: 11px; color: #607d8b; line-height: 1.4; }
    </style>
</head>

<body>
    <div id="toolbar">
        <button id="mode-view-btn" class="active">👆 閲覧・リンク</button>
        <div class="add-group">
            <div class="color-palette-container">
                <div id="toolbar-color-palette" class="color-palette"></div>
                <input type="color" id="node-color" value="#3498db" title="カスタムカラーを選択">
            </div>
            <div>
                <input type="text" id="group-name-input" placeholder="グループ名（選択色）">
                <p class="hint-text" style="color: #bdc3c7; margin: 2px 0 0 2px;">※色は複数タップして選べます</p>
            </div>
            <button id="add-node-btn">➕ 技を追加</button>
        </div>
        <button id="mode-prereq-btn">↙️ 前提線を引く</button>
        <button id="mode-trans-btn">🔄 遷移線を引く</button>
        <button id="mode-delete-btn">🗑 タッチ消去</button>
        <button id="undo-btn">↩️ 戻る</button>
        <button id="arrange-btn">✨ 整列</button>
        
        <button id="cloud-save-btn" class="btn-io" style="display: none;">☁️ クラウド保存</button>
        <button id="cloud-load-btn" class="btn-io" style="display: none;">☁️ クラウド読込</button>
        <button id="local-save-btn" class="btn-io">💾 ローカル保存</button>
        <button id="local-load-btn" class="btn-io" onclick="document.getElementById('file-input').click()">📂 ローカル読込</button>
        <input type="file" id="file-input" style="display: none;" accept=".json">

        <button id="login-btn" class="btn-auth">🔑 Googleログイン</button>
        <button id="logout-btn" class="btn-auth" style="display: none;">🚪 ログアウト</button>
        <span id="user-info"></span>
    </div>

    <div id="cy-wrap">
        <div id="cy"></div>
        <div id="group-legend">
            <h4>グループ表示（タップで一覧）</h4>
            <div id="group-legend-list"></div>
        </div>
    </div>

    <div id="modal-overlay"></div>

    <div id="link-modal" class="floating-modal">
        <h3>トランジション一覧</h3>
        <div id="modal-content"></div>
        <button class="modal-btn close-btn" onclick="closeModal()">閉じる</button>
    </div>

    <div id="cloud-save-modal" class="floating-modal">
        <h3>クラウドに保存</h3>
        <div class="modal-field">
            <label for="cloud-title-input">ファイル名</label>
            <input type="text" id="cloud-title-input" placeholder="ファイル名を入力">
        </div>
        <div class="modal-field">
            <label for="cloud-status-select">公開設定</label>
            <select id="cloud-status-select" style="color: #2c3e50; font-weight: bold; background-color: #fff;">
                <option value="private">🔒 非公開 (自分だけ)</option>
                <option value="unlisted">🔗 限定公開 (リンクを知っている人のみ・編集不可)</option>
                <option value="public_readonly">👁 公開 (誰でも閲覧可・編集不可)</option>
                <option value="public_writable">✏️ 共同編集 (誰でも閲覧・編集可)</option>
            </select>
        </div>
        <button id="cloud-save-confirm-btn" class="modal-btn">保存する</button>
        <button class="modal-btn close-btn" onclick="closeCloudSaveModal()">閉じる</button>
    </div>

    <div id="cloud-load-modal" class="floating-modal" style="max-height: 80vh; overflow-y: auto; max-width: 420px; width: 92%;">
        <h3>クラウドから読み込み</h3>
        <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 12px;">開きたいファイルを選択してください</p>
        <div id="cloud-load-list" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;"></div>
        <button class="modal-btn close-btn" onclick="closeCloudLoadModal()">閉じる</button>
    </div>

    <div id="group-list-modal" class="floating-modal" style="max-height: 80vh; overflow-y: auto; max-width: 420px; width: 92%;">
        <h3 id="group-list-title">グループ一覧</h3>
        <div id="group-list-content" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;"></div>
        <button class="modal-btn close-btn" onclick="closeGroupListModal()">閉じる</button>
    </div>

    <div id="node-editor" class="floating-modal">
        <h3>技を編集</h3>
        <div class="modal-field">
            <label for="node-name-input">技名</label>
            <textarea id="node-name-input" placeholder="技名を入力"></textarea>
            <p class="hint-text">改行もそのまま使えます。</p>
        </div>
        <div class="modal-field">
            <label for="node-url-input">動画URL</label>
            <input type="url" id="node-url-input" placeholder="https://...">
        </div>
        <div class="modal-field">
            <label>所属グループ（色を複数タップで選択可）</label>
            <div class="color-palette-container" style="background: transparent; padding: 0; justify-content: center; margin-bottom: 8px;">
                <div id="modal-color-palette" class="color-palette" style="grid-template-columns: repeat(5, 28px); gap: 10px;"></div>
            </div>
            <div style="text-align: center;">
                <input type="color" id="node-color-input" value="#3498db" title="その他の色を選択">
            </div>
        </div>
        <div class="modal-field">
            <label for="node-group-input">グループ名（最後にタップした選択色名）</label>
            <input type="text" id="node-group-input" placeholder="例: 返し技 / 左系 / 基本形">
        </div>
        <button id="node-save-btn" class="modal-btn">保存</button>
        <button class="modal-btn close-btn" onclick="closeNodeEditor()">閉じる</button>
    </div>

    <div id="trans-editor" class="floating-modal" style="max-height: 85vh; overflow-y: auto; max-width: 420px; width: 92%;">
        <h3>遷移線を編集</h3>
        <p style="font-size: 11px; color: #666; text-align: center; margin-bottom: 12px;">※色を複数つけると線の色がグラデーションになります</p>
        <div id="trans-inputs-container"></div>
        <button id="trans-save-btn" class="modal-btn" style="background-color: #2ecc71;">すべての変更を保存</button>
        <button class="modal-btn close-btn" onclick="closeTransEditor()">閉じる</button>
    </div>

    <script>
        // ==========================================
        // Supabase の初期化
        // ==========================================
        const SUPABASE_URL = 'https://fqipmvzalmfyywshtvoe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxaXBtdnphbG1meXl3c2h0dm9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NDQzODMsImV4cCI6MjA5ODIyMDM4M30.E89j8-fBbOxmoCOx-LWva7JMHOPq2XK-qxyw3V1vuzE';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentTreeTitle = '';
        let currentTreeStatus = 'private';

        sb.auth.onAuthStateChange((event, session) => {
            currentUser = session?.user || null;
            updateAuthUI();
        });

        function updateAuthUI() {
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userInfo = document.getElementById('user-info');
            const cloudSaveBtn = document.getElementById('cloud-save-btn');
            const cloudLoadBtn = document.getElementById('cloud-load-btn');
            const localSaveBtn = document.getElementById('local-save-btn');
            const localLoadBtn = document.getElementById('local-load-btn');

            if (currentUser) {
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                userInfo.style.display = 'inline-block';
                userInfo.textContent = `${currentUser.email} でログイン中`;
                cloudSaveBtn.style.display = 'inline-block';
                cloudLoadBtn.style.display = 'inline-block';
                localSaveBtn.style.display = 'none';
                localLoadBtn.style.display = 'none';
            } else {
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                userInfo.style.display = 'none';
                cloudSaveBtn.style.display = 'none';
                cloudLoadBtn.style.display = 'none';
                localSaveBtn.style.display = 'inline-block';
                localLoadBtn.style.display = 'inline-block';
            }
        }

        document.getElementById('login-btn').addEventListener('click', async () => {
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
            if (error) alert('ログインエラー: ' + error.message);
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            const { error } = await sb.auth.signOut();
            if (error) alert('ログアウトエラー: ' + error.message);
        });

        function closeCloudSaveModal() {
            document.getElementById('cloud-save-modal').style.display = 'none';
            closeOverlayIfUnused();
        }

        document.getElementById('cloud-save-btn').addEventListener('click', () => {
            if (!currentUser) return alert('ログインしてください。');
            document.getElementById('cloud-title-input').value = currentTreeTitle || '無題のハッセ図';
            document.getElementById('cloud-status-select').value = currentTreeStatus || 'private';
            openOverlay();
            document.getElementById('cloud-save-modal').style.display = 'block';
        });

        document.getElementById('cloud-save-confirm-btn').addEventListener('click', async () => {
            const title = document.getElementById('cloud-title-input').value.trim();
            if (!title) return alert('ファイル名を入力してください。');
            const status = document.getElementById('cloud-status-select').value;
            const btn = document.getElementById('cloud-save-confirm-btn');
            btn.textContent = '保存中...';

            const graphData = cy.json();
            const { data, error } = await sb
                .from('trees')
                .upsert({
                    user_id: currentUser.id,
                    title: title,
                    graph_data: graphData,
                    status: status
                }, { onConflict: 'user_id,title' });

            btn.textContent = '保存する';
            if (error) {
                console.error(error);
                alert('保存に失敗しました: ' + error.message);
            } else {
                currentTreeTitle = title;
                currentTreeStatus = status;
                closeCloudSaveModal();
                alert(`クラウドに「${title}」として保存しました！`);
            }
        });

        const cloudLoadModal = document.getElementById('cloud-load-modal');
        const cloudLoadList = document.getElementById('cloud-load-list');

        function closeCloudLoadModal() {
            cloudLoadModal.style.display = 'none';
            closeOverlayIfUnused();
        }

        document.getElementById('cloud-load-btn').addEventListener('click', async () => {
            if (!currentUser) return alert('ログインしてください。');
            const btn = document.getElementById('cloud-load-btn');
            btn.textContent = '一覧取得中...';

            const { data, error } = await sb
                .from('trees')
                .select('title, status')
                .eq('user_id', currentUser.id)
                .order('updated_at', { ascending: false });

            btn.textContent = '☁️ クラウド読込';
            if (error) {
                console.error(error);
                return alert('一覧の取得に失敗しました: ' + error.message);
            }
            if (!data || data.length === 0) {
                return alert('保存されたデータが見つかりません。');
            }

            cloudLoadList.innerHTML = '';
            data.forEach(item => {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.gap = '8px';
                row.style.alignItems = 'center';
                row.style.marginBottom = '4px';

                let statusIcon = '🔒';
                if (item.status === 'unlisted') statusIcon = '🔗';
                if (item.status === 'public_readonly') statusIcon = '👁';
                if (item.status === 'public_writable') statusIcon = '✏️';

                const fileBtn = document.createElement('button');
                fileBtn.className = 'modal-btn secondary';
                fileBtn.style.textAlign = 'left';
                fileBtn.style.margin = '0';
                fileBtn.style.flex = '1';
                fileBtn.textContent = `${statusIcon} ${item.title}`;
                fileBtn.addEventListener('click', () => loadSpecificTree(item.title));

                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑';
                delBtn.style.backgroundColor = '#e74c3c';
                delBtn.style.padding = '12px';
                delBtn.style.borderRadius = '8px';
                delBtn.style.cursor = 'pointer';
                delBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm(`本当に「${item.title}」を削除しますか？`)) return;
                    const { error: delError } = await sb
                        .from('trees')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .eq('title', item.title);

                    if (delError) alert('削除に失敗しました: ' + delError.message);
                    else {
                        alert(`「${item.title}」を削除しました。`);
                        document.getElementById('cloud-load-btn').click();
                    }
                });

                row.appendChild(fileBtn);
                row.appendChild(delBtn);
                cloudLoadList.appendChild(row);
            });

            openOverlay();
            cloudLoadModal.style.display = 'block';
        });

        async function loadSpecificTree(title) {
            const { data, error } = await sb
                .from('trees')
                .select('graph_data, status')
                .eq('user_id', currentUser.id)
                .eq('title', title)
                .single();

            if (error) {
                console.error(error);
                alert('読込に失敗しました: ' + error.message);
            } else if (data && data.graph_data) {
                cy.json(data.graph_data);
                undoStack = [];
                currentTreeTitle = title;
                currentTreeStatus = data.status || 'private';
                normalizeGraphData();
                updateGroupLegend();
                closeCloudLoadModal();
                alert(`「${title}」を読み込みました！`);
            }
        }

        // ==========================================
        // カラーパレット管理プログラム
        // ==========================================
        const PRESET_COLORS = [
            '#e74c3c', '#e91e63', '#9b59b6', '#673ab7', '#3f51b5',
            '#3498db', '#03a9f4', '#00bcd4', '#1abc9c', '#2ecc71',
            '#8bc34a', '#cddc39', '#f1c40f', '#ffc107', '#f39c12',
            '#e67e22', '#795548', '#95a5a6', '#34495e', '#000000'
        ];

        function normalizeColor(color) {
            if (!color) return '#95a5a6';
            let c = String(color).trim().toLowerCase();
            if (/^#[0-9a-f]{3}$/.test(c)) {
                c = '#' + c[1] + c[1] + c[2] + c[2] + c[3] + c[3];
            }
            return c;
        }

        class PaletteManager {
            constructor(containerId, inputColorId, inputTextId) {
                this.container = document.getElementById(containerId);
                this.inputColor = inputColorId ? document.getElementById(inputColorId) : null;
                this.inputText = inputTextId ? document.getElementById(inputTextId) : null;
                this.selectedColors = ['#3498db'];
                this.activeColor = '#3498db';
            }

            init() {
                this.container.innerHTML = '';
                PRESET_COLORS.forEach(color => {
                    const swatch = document.createElement('div');
                    swatch.className = 'color-swatch';
                    swatch.style.backgroundColor = color;
                    swatch.dataset.color = color.toLowerCase();
                    swatch.addEventListener('click', () => this.handleSwatchClick(color));
                    this.container.appendChild(swatch);
                });

                if (this.inputColor) {
                    this.inputColor.addEventListener('input', (e) => {
                        const color = normalizeColor(e.target.value);
                        if (!this.selectedColors.includes(color)) this.selectedColors.push(color);
                        this.activeColor = color;
                        this.render();
                        this.syncText();
                    });
                }

                if (this.inputText) {
                    this.inputText.addEventListener('input', (e) => {
                        const newName = e.target.value.trim();
                        const colorMap = cy.data('colorMap') || {};
                        if (this.activeColor) {
                            colorMap[this.activeColor] = newName;
                            cy.data('colorMap', colorMap);
                            updateGroupLegend();
                        }
                    });
                }

                this.render();
                this.syncText();
            }

            handleSwatchClick(color) {
                color = normalizeColor(color);
                const index = this.selectedColors.indexOf(color);
                if (index > -1) {
                    this.selectedColors.splice(index, 1);
                    if (this.activeColor === color) {
                        this.activeColor = this.selectedColors.length > 0 ? this.selectedColors[this.selectedColors.length - 1] : null;
                    }
                } else {
                    this.selectedColors.push(color);
                    this.activeColor = color;
                }
                this.render();
                this.syncText();
            }

            render() {
                this.container.querySelectorAll('.color-swatch').forEach(el => {
                    const c = el.dataset.color;
                    if (this.selectedColors.includes(c)) {
                        el.classList.add('selected');
                        if (c === this.activeColor) {
                            el.style.transform = 'scale(1.15)';
                            el.style.boxShadow = '0 0 0 2px #fff, 0 0 0 4px #000';
                            el.style.zIndex = '2';
                        } else {
                            el.style.transform = '';
                            el.style.boxShadow = '';
                            el.style.zIndex = '';
                        }
                    } else {
                        el.classList.remove('selected');
                        el.style.transform = '';
                        el.style.boxShadow = '';
                        el.style.zIndex = '';
                    }
                });
                if (this.activeColor && this.inputColor) {
                    this.inputColor.value = this.activeColor;
                }
            }

            syncText() {
                if (!this.inputText) return;
                if (this.activeColor) {
                    const colorMap = cy.data('colorMap') || {};
                    this.inputText.value = colorMap[this.activeColor] || '';
                    this.inputText.disabled = false;
                    this.inputText.placeholder = "グループ名を入力";
                } else {
                    this.inputText.value = '';
                    this.inputText.disabled = true;
                    this.inputText.placeholder = "色をタップして選択";
                }
            }

            setSelectedColors(colors) {
                this.selectedColors = colors.map(normalizeColor);
                this.activeColor = this.selectedColors.length > 0 ? this.selectedColors[this.selectedColors.length - 1] : null;
                this.render();
                this.syncText();
            }

            getSelectedColors() {
                return this.selectedColors;
            }
        }

        let undoStack = [];

        const cy = cytoscape({

        // ノードの円グラフ塗り分け
        function applyNodePieStyle(node) {
            let colors = node.data('colors') || [];
            if (colors.length === 0 && node.data('color')) colors = [node.data('color')];
            if (colors.length === 0) colors = ['#95a5a6'];

            if (colors.length === 1) {
                node.style({ 'background-color': colors[0], 'pie-size': '0%' });
            } else {
                let styleObj = { 'background-color': '#95a5a6', 'pie-size': '100%' };
                const percent = 100 / colors.length;
                for (let i = 1; i <= 16; i++) {
                    if (i <= colors.length) {
                        styleObj[`pie-${i}-background-color`] = colors[i - 1];
                        styleObj[`pie-${i}-background-size`] = percent;
                    } else {
                        styleObj[`pie-${i}-background-size`] = 0;
                    }
                }
                node.style(styleObj);
            }
        }

        // 遷移線のグラデーション塗り分け
        function applyEdgeGradientStyle(edge) {
            const transitions = edge.data('transitions') || [];
            let allColors = [];
            transitions.forEach(t => {
                if (t.colors) {
                    t.colors.forEach(c => {
                        if (!allColors.includes(c)) allColors.push(c);
                    });
                }
            });
            if (allColors.length === 0) allColors = ['#95a5a6'];

            if (allColors.length === 1) {
                edge.style({
                    'line-fill': 'solid',
                    'line-color': allColors[0],
                    'target-arrow-color': allColors[0]
                });
            } else {
                const step = 100 / (allColors.length - 1);
                const positions = allColors.map((c, i) => (i * step) + '%');
                edge.style({
                    'line-fill': 'linear-gradient',
                    'line-gradient-stop-colors': allColors.join(' '),
                    'line-gradient-stop-positions': positions.join(' '),
                    'target-arrow-color': allColors[allColors.length - 1]
                });
            }
        }

        const btns = {
            view: document.getElementById('mode-view-btn'),
            prereq: document.getElementById('mode-prereq-btn'),
            trans: document.getElementById('mode-trans-btn'),
            delete: document.getElementById('mode-delete-btn')
        };

        const modalOverlay = document.getElementById('modal-overlay');
        const linkModal = document.getElementById('link-modal');
        const modalContent = document.getElementById('modal-content');
        const nodeEditor = document.getElementById('node-editor');
        const transEditor = document.getElementById('trans-editor');
        const groupListModal = document.getElementById('group-list-modal');

        const toolbarPalette = new PaletteManager('toolbar-color-palette', 'node-color', 'group-name-input');
        const modalPalette = new PaletteManager('modal-color-palette', 'node-color-input', 'node-group-input');

        function setMode(mode) {
            currentMode = mode;
            Object.values(btns).forEach(btn => btn.className = '');
            cy.elements().removeClass('selected-source');
            sourceNode = null;
            if (mode === 'view') btns.view.classList.add('active');
            if (mode === 'prereq') btns.prereq.classList.add('active-prereq');
            if (mode === 'trans') btns.trans.classList.add('active-trans');
            if (mode === 'delete') btns.delete.classList.add('active-delete');

        function openOverlay() { modalOverlay.style.display = 'block'; }
        function closeOverlayIfUnused() {
            const anyOpen = [
                linkModal, nodeEditor, transEditor, cloudLoadModal, groupListModal, document.getElementById('cloud-save-modal')
            ].some(el => el.style.display === 'block');
            if (!anyOpen) modalOverlay.style.display = 'none';
        }

        function updateNodeDisplay(node) {
            const rawName = node.data('rawName') || '無名';
            const url = (node.data('url') || '').trim();
            node.data('label', rawName + (url ? '\n🔗' : ''));
        }

        function buildTransitionLabel(transitions) {
            if (!transitions || transitions.length === 0) return '';
            if (transitions.length === 1) return transitions[0].name || '';
            return transitions.map((t, i) => `${i + 1}. ${t.name || ''}`).join('\n');
        }

        function normalizeGraphData() {
            let colorMap = cy.data('colorMap') || {};
            let mapUpdated = false;

            cy.nodes().forEach(node => {
                let colors = node.data('colors');
                if (!colors || !Array.isArray(colors)) {
                    colors = [normalizeColor(node.data('color') || '#3498db')];
                    node.data('colors', colors);
                }

                let oldGroupName = (node.data('groupName') || '').trim();
                if (oldGroupName && colors.length > 0) {
                    if (!colorMap[colors[0]]) { colorMap[colors[0]] = oldGroupName; mapUpdated = true; }
                }

                if (!node.data('rawName')) {
                    const oldLabel = node.data('label') || '';
                    node.data('rawName', oldLabel.replace(/\n?🔗/g, ''));
                }
                updateNodeDisplay(node);
                applyNodePieStyle(node);
            });

            if (mapUpdated || !cy.data('colorMap')) cy.data('colorMap', colorMap);

            const edgesToMerge = {};
            const edgesToRemove = [];
            
            cy.edges('[edgeType="trans"]').forEach(edge => {
                let transitions = edge.data('transitions');
                if (!transitions || transitions.length === 0) {
                    const cleanName = (edge.data('rawName') || edge.data('label') || '').replace(/ 🎥/g, '').trim();
                    const edgeColor = edge.data('color') ? normalizeColor(edge.data('color')) : '#95a5a6';
                    if (cleanName !== '') transitions = [{ name: cleanName, url: edge.data('url') || '', colors: [edgeColor] }];
                    else transitions = [];
                }

                if (transitions.length > 0) {
                    const key = `${edge.source().id()}->${edge.target().id()}`;
                    if (!edgesToMerge[key]) {
                        edgesToMerge[key] = { edge: edge, transitions: [...transitions] };
                    } else {
                        edgesToMerge[key].transitions.push(...transitions);
                        edgesToRemove.push(edge);
                    }
                } else {
                    edgesToRemove.push(edge);
                }
            });

            edgesToRemove.forEach(e => e.remove());

            Object.values(edgesToMerge).forEach(item => {
                item.transitions.forEach(t => { if (!t.colors || t.colors.length === 0) t.colors = ['#95a5a6']; });
                item.edge.data({
                    transitions: item.transitions,
                    label: buildTransitionLabel(item.transitions),
                    hasTransUrl: item.transitions.some(t => t.url)
                });
                applyEdgeGradientStyle(item.edge); 
            });
        }

        // グループごとの技一覧をモーダルで表示する
        function showGroupListModal(color) {
            const colorMap = cy.data('colorMap') || {};
            const groupName = colorMap[color] || '名前なし';
            document.getElementById('group-list-title').textContent = `${groupName} の一覧`;
            
            const content = document.getElementById('group-list-content');
            content.innerHTML = '';
            let hasItems = false;
            
            // 技(ノード)を追加
            cy.nodes().forEach(node => {
                const colors = node.data('colors') || [];
                if (colors.includes(color)) {
                    hasItems = true;
                    const rawName = node.data('rawName') || '無名';
                    const url = node.data('url') || '';
                    
                    const item = document.createElement('div');
                    item.style.padding = '10px';
                    item.style.borderBottom = '1px solid #ecf0f1';
                    item.style.display = 'flex';
                    item.style.justifyContent = 'space-between';
                    item.style.alignItems = 'center';
                    item.innerHTML = `<span style="font-size:14px; font-weight:bold; color:#2c3e50;">【技】 ${rawName}</span>`;

                    if (url) {
                        const btn = document.createElement('a');
                        btn.href = url; btn.target = '_blank'; btn.className = 'modal-btn';
                        btn.style.margin = '0'; btn.style.width = 'auto'; btn.style.padding = '6px 12px'; btn.style.fontSize = '12px'; btn.style.textDecoration = 'none';
                        btn.textContent = '🎥 動画を見る';
                        item.appendChild(btn);
                    }
                    content.appendChild(item);
                }
            });

            // 遷移線(エッジ)を追加
            cy.edges('[edgeType="trans"]').forEach(edge => {
                const transitions = edge.data('transitions') || [];
                transitions.forEach(t => {
                    if ((t.colors || []).includes(color)) {
                        hasItems = true;
                        const tName = t.name || '無名遷移';
                        const url = t.url || '';
                        
                        const item = document.createElement('div');
                        item.style.padding = '10px';
                        item.style.borderBottom = '1px solid #ecf0f1';
                        item.style.display = 'flex';
                        item.style.justifyContent = 'space-between';
                        item.style.alignItems = 'center';
                        item.innerHTML = `<span style="font-size:14px; font-weight:bold; color:#2c3e50;">【遷移】 ${tName}</span>`;

                        if (url) {
                            const btn = document.createElement('a');
                            btn.href = url; btn.target = '_blank'; btn.className = 'modal-btn';
                            btn.style.margin = '0'; btn.style.width = 'auto'; btn.style.padding = '6px 12px'; btn.style.fontSize = '12px'; btn.style.textDecoration = 'none';
                            btn.textContent = '🎥 動画を見る';
                            item.appendChild(btn);
                        }
                        content.appendChild(item);
                    }
                });
            });

            if (!hasItems) {
                content.innerHTML = '<div style="text-align:center; color:#7f8c8d; font-size:13px; padding:10px;">このグループに属する項目はありません</div>';
            }

            openOverlay();
            groupListModal.style.display = 'block';
        }

        function closeGroupListModal() { groupListModal.style.display = 'none'; closeOverlayIfUnused(); }

        function updateGroupLegend() {
            const list = document.getElementById('group-legend-list');
            const colorMap = cy.data('colorMap') || {};
            const usedColors = new Map();

            // ノードの色を集計
            cy.nodes().forEach(node => {
                let colors = node.data('colors') || [];
                colors.forEach(c => usedColors.set(c, (usedColors.get(c) || 0) + 1));
            });

            // エッジの色を集計
            cy.edges('[edgeType="trans"]').forEach(edge => {
                let transitions = edge.data('transitions') || [];
                transitions.forEach(t => {
                    let colors = t.colors || [];
                    colors.forEach(c => usedColors.set(c, (usedColors.get(c) || 0) + 1));
                });
            });

            if (usedColors.size === 0) {
                list.innerHTML = '<div class="legend-empty">技や遷移線を追加すると色ごとのグループが表示されます。</div>';
                return;
            }

            list.innerHTML = '';
            Array.from(usedColors.entries()).sort((a, b) => b[1] - a[1]).forEach(([color, count]) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                const displayName = colorMap[color] || '(名前なし)';
                item.innerHTML = `<span class="legend-swatch" style="background:${color}"></span><span style="font-size:13px; font-weight:bold; color:#34495e;">${displayName} (${count})</span>`;
                item.addEventListener('click', () => showGroupListModal(color));
                list.appendChild(item);
            });
        }

        function closeModal() { linkModal.style.display = 'none'; closeOverlayIfUnused(); }
        function closeNodeEditor() { nodeEditor.style.display = 'none'; editingNode = null; closeOverlayIfUnused(); }
        function closeTransEditor() { transEditor.style.display = 'none'; editingEdge = null; closeOverlayIfUnused(); }

        function showModal(transitions) {

                const btn = document.createElement('a');

        function openNodeEditor(node) {
            editingNode = node;
            document.getElementById('node-name-input').value = node.data('rawName') || '';
            document.getElementById('node-url-input').value = node.data('url') || '';
            let colors = node.data('colors') || [];
            modalPalette.setSelectedColors(colors);
            openOverlay();
            nodeEditor.style.display = 'block';
        }

        function openTransEditor(edge) {
            editingEdge = edge;
            const transitions = edge.data('transitions') || [];
            const container = document.getElementById('trans-inputs-container');
            container.innerHTML = '';
            activeTransPalettes = [];

            transitions.forEach((t, i) => {
                const box = document.createElement('div');
                box.style.border = '1px solid #ddd';
                box.style.padding = '10px';
                box.style.borderRadius = '8px';
                box.style.marginBottom = '12px';
                box.style.backgroundColor = '#fafafa';

                box.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                        <span style="font-size:12px; font-weight:bold; color:#2c3e50;">技の遷移 #${i + 1}</span>
                        ${transitions.length > 1 ? `<button type="button" class="del-trans-btn" data-index="${i}" style="background-color:#e74c3c; padding:4px 8px; font-size:11px;">削除</button>` : ''}
                    </div>
                    <div class="modal-field">
                        <label style="font-size:11px; margin-bottom:2px; color:#555;">遷移名</label>
                        <input type="text" class="trans-name-field" value="${t.name || ''}" placeholder="遷移名を入力" style="padding:6px; font-size:13px;">
                    </div>
                    <div class="modal-field">
                        <label style="font-size:11px; margin-bottom:2px; color:#555;">動画URL</label>
                        <input type="url" class="trans-url-field" value="${t.url || ''}" placeholder="https://..." style="padding:6px; font-size:13px;">
                    </div>
                    <div class="modal-field" style="margin-bottom:0;">
                        <label style="font-size:11px; margin-bottom:2px; color:#555;">色分け（複数タップ可）</label>
                        <div class="color-palette-container" style="background: transparent; padding: 0; justify-content: flex-start; margin-bottom: 8px;">
                            <div id="trans-palette-${i}" class="color-palette" style="grid-template-columns: repeat(10, 22px); gap: 4px;"></div>
                        </div>
                    </div>
                    <div class="modal-field">
                        <label style="font-size:11px; margin-bottom:2px; color:#555;">グループ名（最後にタップした選択色名）</label>
                        <input type="text" id="trans-group-input-${i}" placeholder="グループ名を入力" style="padding:6px; font-size:13px;">
                    </div>
                `;
                container.appendChild(box);

                // PaletteManager が持つ連動機能に完全に任せることでバグを防ぎます
                const pm = new PaletteManager(`trans-palette-${i}`, null, `trans-group-input-${i}`);
                pm.init();
                pm.setSelectedColors(t.colors && t.colors.length > 0 ? t.colors : ['#95a5a6']);
                activeTransPalettes.push(pm);
            });

            container.querySelectorAll('.del-trans-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const indexToRemove = parseInt(e.currentTarget.dataset.index);
                    const currentTrans = [...editingEdge.data('transitions')];
                    currentTrans.splice(indexToRemove, 1);
                    editingEdge.data('transitions', currentTrans);
                    openTransEditor(editingEdge);
                });
            });

            openOverlay();
            transEditor.style.display = 'block';
        }

        function saveNodeEditor() {
            if (!editingNode) return;
            const oldData = editingNode.json();
            const newName = document.getElementById('node-name-input').value.trim();
            if (!newName) return alert('技名を入力してください。');
            const newUrl = document.getElementById('node-url-input').value.trim();
            const newColors = modalPalette.getSelectedColors();
            const colorsToSave = newColors.length > 0 ? newColors : ['#95a5a6'];
            
            editingNode.data({ rawName: newName, url: newUrl, colors: colorsToSave, color: colorsToSave[0] });
            updateNodeDisplay(editingNode);
            applyNodePieStyle(editingNode);
            pushUndo('edit', { ele: editingNode, oldData: oldData });
            
            updateGroupLegend();
            closeNodeEditor();
        }

        function saveTransEditor() {
            if (!editingEdge) return;
            const oldData = editingEdge.json();
            const container = document.getElementById('trans-inputs-container');
            const nameFields = container.querySelectorAll('.trans-name-field');
            const urlFields = container.querySelectorAll('.trans-url-field');
            const newTransitions = [];
            let isValid = true;

            nameFields.forEach((field, idx) => {
                const nameVal = field.value.trim();
                const urlVal = urlFields[idx].value.trim();
                const colorsVal = activeTransPalettes[idx].getSelectedColors();
                const colorsToSave = colorsVal.length > 0 ? colorsVal : ['#95a5a6'];

                if (!nameVal) isValid = false;
                newTransitions.push({ name: nameVal, url: urlVal, colors: colorsToSave });
            });

            if (!isValid) return alert('遷移名が空欄の項目があります。');

            editingEdge.data({
                transitions: newTransitions,
                label: buildTransitionLabel(newTransitions),
                hasTransUrl: newTransitions.some(t => t.url)
            });
            applyEdgeGradientStyle(editingEdge);
            pushUndo('edit', { ele: editingEdge, oldData: oldData });
            
            // 編集内容を保存してからレジェンドを更新することで、確実に追加した色が反映されます
            updateGroupLegend();
            closeTransEditor();
        }

        btns.view.addEventListener('click', () => setMode('view'));
        btns.prereq.addEventListener('click', () => setMode('prereq'));
        btns.trans.addEventListener('click', () => setMode('trans'));
        btns.delete.addEventListener('click', () => setMode('delete'));

        document.getElementById('node-save-btn').addEventListener('click', saveNodeEditor);
        document.getElementById('trans-save-btn').addEventListener('click', saveTransEditor);

        document.getElementById('add-node-btn').addEventListener('click', () => {
            const rawName = prompt('技名を入力してください (改行も使えます):');
            if (!rawName) return;
            
            const selectedColors = toolbarPalette.getSelectedColors();
            const colorsToSave = selectedColors.length > 0 ? selectedColors : ['#3498db'];
            const normalizedName = rawName.replace(/\\n/g, '\n');
            const newId = 'node_' + Date.now();
            
            const newNode = cy.add({
                group: 'nodes',
                data: { id: newId, label: normalizedName, rawName: normalizedName, url: '', colors: colorsToSave, color: colorsToSave[0] },
                position: { x: cy.width() / 2, y: cy.height() / 2 }
            });

            updateNodeDisplay(newNode);
            applyNodePieStyle(newNode);
            pushUndo('add', newNode.jsons());
            updateGroupLegend();
            setMode('view');
        });

        let tapTimeout = null;
        let lastTapTarget = null;
        const DOUBLE_TAP_DELAY = 250;

        cy.on('tap', function (evt) {
            const target = evt.target;
            if (lastTapTarget === target && tapTimeout !== null) {
                clearTimeout(tapTimeout);
                tapTimeout = null;
                lastTapTarget = null;
                if (target !== cy) handleEdit(target);
                return;
            }
            lastTapTarget = target;
            tapTimeout = setTimeout(() => {
                tapTimeout = null;
                lastTapTarget = null;
                handleSingleTap(target);
            }, DOUBLE_TAP_DELAY);
        });

        function handleEdit(target) {
            if (target.isNode()) return openNodeEditor(target);
            if (target.isEdge() && target.data('edgeType') === 'trans') return openTransEditor(target);
        }

        function handleSingleTap(target) {
            if (target === cy) {
                cy.nodes().removeClass('highlight-duplicate');
                if (sourceNode) { sourceNode.removeClass('selected-source'); sourceNode = null; }
                return;
            }

            if (currentMode === 'delete') {
                const removedJsons = target.jsons();
                target.remove();
                pushUndo('remove', removedJsons);
                updateGroupLegend();
                return;
            }

            if (currentMode === 'view') {
                if (target.isNode()) {
                    cy.nodes().removeClass('highlight-duplicate');
                    const nodeName = target.data('rawName');
                    if (nodeName) {
                        cy.nodes().forEach(n => { if (n.data('rawName') === nodeName && n.id() !== target.id()) n.addClass('highlight-duplicate'); });
                    }
                    const url = (target.data('url') || '').trim();
                    if (url !== '') window.open(url, '_blank');
                    else alert('この技にはURLが設定されていません。\n※ダブルタップで編集できます。');
                } else if (target.isEdge() && target.data('edgeType') === 'trans') {
                    const transitions = target.data('transitions') || [];
                    if (transitions.length === 0) return;
                    if (transitions.length === 1 && transitions[0].url) window.open(transitions[0].url, '_blank');
                    else showModal(transitions);
                }
                return;
            }

            if ((currentMode === 'prereq' || currentMode === 'trans') && target.isNode()) {
                if (!sourceNode) {
                    sourceNode = target;
                    sourceNode.addClass('selected-source');
                } else {
                    if (currentMode === 'prereq') {
                        if (sourceNode.id() === target.id()) return alert('前提技は自分自身に繋げません。');
                        const existing = cy.edges(`[source="${sourceNode.id()}"][target="${target.id()}"][edgeType="prereq"]`);
                        if (existing.length === 0) {
                            const newEdge = cy.add({
                                group: 'edges',
                                data: { id: 'edge_' + Date.now(), source: sourceNode.id(), target: target.id(), edgeType: 'prereq' }
                            });
                            pushUndo('add', newEdge.jsons());
                        }
                    } else if (currentMode === 'trans') {
                        const transName = prompt('遷移技の名前（入り方など）:');
                        if (transName) {
                            const transUrl = prompt('この遷移のYouTube URL (空でもOK):', '') || '';
                            const selectedColors = toolbarPalette.getSelectedColors();
                            const colorsToSave = selectedColors.length > 0 ? selectedColors : ['#95a5a6'];
                            const existing = cy.edges(`[source="${sourceNode.id()}"][target="${target.id()}"][edgeType="trans"]`);

                            if (existing.length > 0) {
                                const edge = existing[0];
                                const oldData = edge.json();
                                const transitions = edge.data('transitions') || [];
                                transitions.push({ name: transName, url: transUrl, colors: colorsToSave });
                                edge.data({
                                    transitions: transitions,
                                    label: buildTransitionLabel(transitions),
                                    hasTransUrl: transitions.some(t => t.url)
                                });
                                applyEdgeGradientStyle(edge);
                                pushUndo('edit', { ele: edge, oldData: oldData });
                                updateGroupLegend();
                            } else {
                                const transitions = [{ name: transName, url: transUrl, colors: colorsToSave }];
                                const newEdge = cy.add({
                                    group: 'edges',
                                    data: {
                                        id: 'edge_' + Date.now(),
                                        source: sourceNode.id(),
                                        target: target.id(),
                                        edgeType: 'trans',
                                        label: buildTransitionLabel(transitions),
                                        transitions: transitions,
                                        hasTransUrl: !!transUrl
                                    }
                                });
                                applyEdgeGradientStyle(newEdge);
                                pushUndo('add', newEdge.jsons());
                                updateGroupLegend();
                            }
                        }
                    }
                    sourceNode.removeClass('selected-source');
                    sourceNode = null;
                }
            }
        }

        modalOverlay.addEventListener('click', () => {
            closeModal();
            closeNodeEditor();
            closeTransEditor();
            closeCloudLoadModal();
            closeCloudSaveModal();
            closeGroupListModal();
        });

        document.getElementById('undo-btn').addEventListener('click', () => {
            if (undoStack.length === 0) return alert('これ以上戻せません。');
            const lastAction = undoStack.pop();
            if (lastAction.action === 'add') {
                lastAction.data.forEach(d => { const ele = cy.getElementById(d.data.id); if (ele.length > 0) ele.remove(); });
            } else if (lastAction.action === 'remove') {
                const restored = cy.add(lastAction.data);
                restored.nodes().forEach(n => applyNodePieStyle(n));
                restored.edges('[edgeType="trans"]').forEach(e => applyEdgeGradientStyle(e));
            } else if (lastAction.action === 'edit') {
                lastAction.data.ele.data(lastAction.data.oldData.data);
                if (lastAction.data.ele.isNode()) applyNodePieStyle(lastAction.data.ele);
                else if (lastAction.data.ele.isEdge() && lastAction.data.ele.data('edgeType') === 'trans') applyEdgeGradientStyle(lastAction.data.ele);
            }
            normalizeGraphData();
            updateGroupLegend();
        });

        document.getElementById('arrange-btn').addEventListener('click', () => {
            cy.layout({ name: 'breadthfirst', directed: true, padding: 50, spacingFactor: 1.5 }).run();
        });

        document.getElementById('local-save-btn').addEventListener('click', () => {
            const data = cy.json();
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'juggling_hasse_data.json';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        });

        document.getElementById('file-input').addEventListener('change', (evt) => {
            const file = evt.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    cy.json(data);
                    undoStack = [];
                    normalizeGraphData();
                    updateGroupLegend();
                } catch (err) { alert('ファイルの読み込みに失敗しました。'); }
            };
            reader.readAsText(file);
            evt.target.value = '';
        });

        toolbarPalette.init();
        modalPalette.init();
        normalizeGraphData();
        updateGroupLegend();
    </script>
</body>

</html>
